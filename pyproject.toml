[project]
name = "eventpulse-backend"
version = "1.0.0"
description = "EventPulse — event management and ticketing platform API"
requires-python = ">=3.12"

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4"]
ignore = ["B008"]  # FastAPI uses function calls (Depends) in argument defaults

[tool.ruff.lint.per-file-ignores]
# Autogenerated migrations conventionally keep the op/sa imports and long lines.
"alembic/versions/*" = ["E501", "F401", "I001"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
filterwarnings = ["ignore::DeprecationWarning"]
