<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}EventPulse{% endblock %}</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f4f4f7; font-family: Arial, Helvetica, sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f7; padding: 24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden;">
            <tr>
              <td style="background-color: #4f46e5; padding: 24px 32px;">
                <h1 style="margin: 0; color: #ffffff; font-size: 22px;">EventPulse</h1>
              </td>
            </tr>
            <tr>
              <td style="padding: 32px;">
                {% block content %}{% endblock %}
              </td>
            </tr>
            <tr>
              <td style="padding: 24px 32px; background-color: #f4f4f7; color: #888888; font-size: 12px;">
                <p style="margin: 0;">You are receiving this email because you have an account on EventPulse.</p>
                <p style="margin: 8px 0 0;">&copy; EventPulse. All rights reserved.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
